<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ethio ANC — Offline</title>
  <meta name="theme-color" content="#0B6E4F" />
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#FBFAF6;color:#191A15;padding:24px}
    .card{max-width:520px;background:white;border:1px solid #DCD8CB;border-radius:22px;padding:24px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
    h1{margin:0 0 8px;color:#0B6E4F}.btn{display:inline-block;margin-top:12px;background:#0B6E4F;color:white;text-decoration:none;padding:10px 16px;border-radius:999px;font-weight:700}
  </style>
</head>
<body>
  <main class="card">
    <h1>Ethio ANC is offline</h1>
    <p>The app shell is available offline. If a page did not load, reconnect once, then reopen the app.</p>
    <a class="btn" href="./">Open Ethio ANC</a>
  </main>
</body>
</html>
